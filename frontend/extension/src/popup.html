<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TermsGuard AI</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    🛡️ TermsGuard AI
  </header>

  <div id="main">
    <button id="analyze-btn">Analyze This Page</button>
    <div id="status"></div>
    <div id="loading" style="display:none;">
      <div class="spinner-ring"></div>
      <div class="loading-steps">
        <div class="step pending" id="step-extract">Extracting clauses</div>
        <div class="step pending" id="step-analyze">Analyzing risks</div>
        <div class="step pending" id="step-report">Preparing report</div>
      </div>
    </div>
    <div id="result" style="display:none;">
      <div id="traffic-light" class="traffic-light"></div>
      <div id="summary"></div>
      <div id="findings"></div>
      <button id="clear-btn">Clear Highlights</button>
      <div id="meta"></div>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
