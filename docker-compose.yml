services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped

  streamlit:
    image: python:3.11-slim
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt -q &&
               streamlit run app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    env_file:
      - ./frontend/streamlit_app/.env.example
    volumes:
      - ./frontend/streamlit_app:/app
    depends_on:
      - backend
    restart: unless-stopped
